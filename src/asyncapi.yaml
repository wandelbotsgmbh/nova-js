              enum:
                - /nova/service-manager
              example: /nova/service-manager
            id:
              description: Unique identifier for this robot controller created event.
              example: controllers-ur10e-created-f0a6d8e5-ca7b-4c9d-ab4f-5a6b7c8d9e0f
            time:
