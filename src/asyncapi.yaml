            time:
              description: Timestamp when the app release was updated.
            data:
              $ref: '#/components/schemas/AppEventData'
        - $ref: '#/components/schemas/CloudEvent'
    AppDeletedEvent:
      allOf:
        - type: object
          description: CloudEvent published when an app release is deleted from a cell.
          required:
