---
useNodeVersion: 24.11.1

# Add minimum release age to mitigate risk of supply chain attacks
# https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@wandelbots/nova-api"

# Prompt to install deps if node_modules is out of date when running scripts
verifyDepsBeforeRun: prompt

# Support pnpm scripts on non-POSIX systems (e.g. Windows)
shellEmulator: true

overrides:
  "foo": "^1.0.0"
  "quux": "npm:@myorg/quux@^1.0.0"
  "bar@^2.1.0": "3.0.0"
  "qar@1>zoo": "2"