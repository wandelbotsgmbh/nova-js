---
useNodeVersion: 24.11.1

minimumReleaseAgeExclude:
  - "@wandelbots/nova-api"

# Support pnpm scripts on non-POSIX systems (e.g. Windows)
shellEmulator: true

allowBuilds:
  esbuild: true
  browser-tabs-lock: false

packages:
  - "."
  - "example"

overrides:
  axios: ">=1.15.2"
  form-data: ">=4.0.6"
  follow-redirects: ">=1.15.12"
  postcss: ">=8.5.10"
  brace-expansion: ">=5.0.6"
  "@wandelbots/nova-js": "workspace:*"
