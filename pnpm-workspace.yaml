---
useNodeVersion: 24.11.1

minimumReleaseAgeExclude:
  - "@wandelbots/nova-api"
# Support pnpm scripts on non-POSIX systems (e.g. Windows)
shellEmulator: true

allowBuilds:
  esbuild: true
  browser-tabs-lock: false
  # Telemetry-only postinstall (phones home on every install), pulled in
  # transitively via @asyncapi/parser -> @stoplight/spectral-*. No need to run it.
  "@scarf/scarf": false

packages:
  - "."
  - "example"

overrides:
  brace-expansion: "^5.0.7"
  shell-quote: "^1.8.5"
  "@wandelbots/nova-js": "workspace:*"
