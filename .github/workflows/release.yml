# semantic-release action
# Derived from https://semantic-release.gitbook.io/semantic-release/recipes/ci-configurations/github-actions

name: release

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

# Note that this release.yml specifically has permission to publish to npm
# given by the "trusted publishers" system; an action with a different
# filename won't work without reconfiguration on the npm side
# https://docs.npmjs.com/trusted-publishers

# Also note the use of hashes in the action versions; this is a security
# best practice to prevent supply chain attacks, as recommended by
# GitHub Copilot for workflows with elevated permissions like releases

permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  pull-requests: write # to be able to comment on released pull requests
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Check for issues in dependencies
        run: pnpm audit --audit-level high
      - name: Build
        run: pnpm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: dist/

  build-and-release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: dist/
      - uses: ./.github/actions/setup-node
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run semantic-release
          pnpm exec semantic-release

  publish-snapshot:
    runs-on: ubuntu-latest
    needs: build
    # Only run for PRs from the same repo (not forks) to prevent unauthorized publishing
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Determine next version via semantic-release dry-run
        id: next-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Point local branch at the PR merge commit so semantic-release
          # sees the base branch name and all commits from both sides
          git checkout -b ${{ github.base_ref }} pull/${{ github.event.number }}/merge

          # Unset GITHUB_ACTIONS so env-ci falls back to git for branch
          # detection instead of seeing the PR ref (workaround for
          # https://github.com/semantic-release/semantic-release/issues/1890)
          unset GITHUB_ACTIONS

          pnpm exec semantic-release --no-ci --dry-run \
            --plugins semantic-release-export-data,@semantic-release/commit-analyzer
      - name: Download build artifacts
        if: steps.next-version.outputs.new-release-published == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: dist/
      - name: Update package.json version
        if: steps.next-version.outputs.new-release-published == 'true'
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.new-release-version }}"
          PR_NUMBER=$(echo "$GITHUB_REF" | sed 's/refs\/pull\/\([0-9]*\)\/.*/\1/')
          COMMIT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          SNAPSHOT_VERSION="${NEXT_VERSION}-pr.${PR_NUMBER}.${COMMIT_SHA}"
          echo "SNAPSHOT_VERSION=$SNAPSHOT_VERSION" >> "$GITHUB_ENV"
          jq --arg version "$SNAPSHOT_VERSION" '.version = $version' package.json > package.tmp.json && mv package.tmp.json package.json
      - name: Install Node.js
        if: steps.next-version.outputs.new-release-published == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24 # Need a recent npm version for npm trusted publishers
      - name: Publish snapshot to npm
        if: steps.next-version.outputs.new-release-published == 'true'
        run: |
          if npm view "@wandelbots/nova-js@$SNAPSHOT_VERSION" version &>/dev/null; then
            echo "Version $SNAPSHOT_VERSION already published, skipping"
          else
            npm publish --tag snapshot
          fi
      - name: Comment on PR with install instructions
        if: steps.next-version.outputs.new-release-published == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const version = process.env.SNAPSHOT_VERSION;
            const marker = '<!-- nova-js-snapshot -->';
            const body = [
              marker,
              `### 📦 Snapshot published`,
              ``,
              `\`\`\``,
              `pnpm add @wandelbots/nova-js@${version}`,
              `\`\`\``,
              ``,
              `> **Note:** If your project uses pnpm's \`minimumReleaseAge\` (enabled by default since pnpm v11), this freshly published snapshot will be blocked. Add the following to your \`pnpm-workspace.yaml\` to allow it:`,
              `> \`\`\`yaml`,
              `> minimumReleaseAgeExclude:`,
              `>   - "@wandelbots/nova-js"`,
              `> \`\`\``,
            ].join('\n');

            // Delete previous snapshot comments to avoid clutter
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const comment of comments) {
              if (comment.user?.type === 'Bot' && comment.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
