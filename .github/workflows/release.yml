# semantic-release action
# Derived from https://semantic-release.gitbook.io/semantic-release/recipes/ci-configurations/github-actions

name: release

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Check for new @wandelbots/nova-api dev builds and publish a matching
    # @wandelbots/nova-js@dev build if one hasn't been published yet
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      nova-api-version:
        description: "@wandelbots/nova-api version/tag to build against (defaults to its 'dev' dist-tag)"
        required: false
        type: string
      dry-run:
        description: "Run npm publish with --dry-run (skips the actual publish) to test the workflow"
        required: false
        type: boolean
        default: false

# Note that this release.yml specifically has permission to publish to npm
# given by the "trusted publishers" system; an action with a different
# filename won't work without reconfiguration on the npm side
# https://docs.npmjs.com/trusted-publishers

# Also note the use of hashes in the action versions; this is a security
# best practice to prevent supply chain attacks, as recommended by
# GitHub Copilot for workflows with elevated permissions like releases

permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  pull-requests: write # to be able to comment on released pull requests
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip for schedule/workflow_dispatch, which are handled entirely by the
    # publish-nova-api-dev job below (it needs its own build with a bumped
    # nova-api version, so reusing this job's artifacts wouldn't help)
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Check for issues in dependencies
        run: pnpm audit --audit-level high
      - name: Build
        run: pnpm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: dist/

  build-and-release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: dist/
      - uses: ./.github/actions/setup-node
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run semantic-release
          pnpm exec semantic-release

  publish-snapshot:
    runs-on: ubuntu-latest
    needs: build
    # Only run for PRs from the same repo (not forks) to prevent unauthorized publishing
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Determine next version via semantic-release dry-run
        id: next-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Simulate a squash merge: create a single commit on the base branch
          # with the PR title as the message, matching what GitHub does on merge
          git config user.name "ci"
          git config user.email "ci@users.noreply.github.com"
          git checkout -b ${{ github.base_ref }} origin/${{ github.base_ref }}
          git merge --squash "$GITHUB_SHA"
          git commit -m "$PR_TITLE" --no-verify

          # Strip npm plugin since it demands an auth token even on dry-run
          yq -i 'del(.plugins[] | select(
            . == "@semantic-release/npm" or
            (type == "!!seq" and .[0] == "@semantic-release/npm")
          ))' .releaserc

          # Unset GITHUB_ACTIONS so env-ci falls back to git for branch
          # detection instead of seeing the PR ref (workaround for
          # https://github.com/semantic-release/semantic-release/issues/1890)
          unset GITHUB_ACTIONS

          pnpm exec semantic-release --no-ci --dry-run
      - name: Download build artifacts
        if: steps.next-version.outputs.new-release-published == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: dist/
      - name: Update package.json version
        if: steps.next-version.outputs.new-release-published == 'true'
        run: |
          NEXT_VERSION="${{ steps.next-version.outputs.new-release-version }}"
          PR_NUMBER=$(echo "$GITHUB_REF" | sed 's/refs\/pull\/\([0-9]*\)\/.*/\1/')
          COMMIT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          SNAPSHOT_VERSION="${NEXT_VERSION}-pr.${PR_NUMBER}.${COMMIT_SHA}"
          echo "SNAPSHOT_VERSION=$SNAPSHOT_VERSION" >> "$GITHUB_ENV"
          jq --arg version "$SNAPSHOT_VERSION" '.version = $version' package.json > package.tmp.json && mv package.tmp.json package.json
      - name: Install Node.js
        if: steps.next-version.outputs.new-release-published == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24 # Need a recent npm version for npm trusted publishers
      - name: Publish snapshot to npm
        if: steps.next-version.outputs.new-release-published == 'true'
        run: |
          if npm view "@wandelbots/nova-js@$SNAPSHOT_VERSION" version &>/dev/null; then
            echo "Version $SNAPSHOT_VERSION already published, skipping"
          else
            npm publish --tag snapshot
          fi
      - name: Comment on PR with install instructions
        if: steps.next-version.outputs.new-release-published == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const version = process.env.SNAPSHOT_VERSION;
            const marker = '<!-- nova-js-snapshot -->';
            const body = [
              marker,
              `### 📦 Snapshot published`,
              ``,
              `\`\`\``,
              `pnpm add @wandelbots/nova-js@${version}`,
              `\`\`\``,
              ``,
              `> **Note:** If your project uses pnpm's \`minimumReleaseAge\` (enabled by default since pnpm v11), add the following to your \`pnpm-workspace.yaml\` to allow using this snapshot:`,
              `> \`\`\`yaml`,
              `> minimumReleaseAgeExclude:`,
              `>   - "@wandelbots/nova-js"`,
              `> \`\`\``,
            ].join('\n');

            // Delete previous snapshot comments to avoid clutter
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            for (const comment of comments) {
              if (comment.user?.type === 'Bot' && comment.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # @wandelbots/nova-api is bundled into our dist at build time (see
  # tsdown.config.ts), so consumers can no longer override its version via
  # pnpm/npm overrides like they could when it was a plain dependency. This
  # job gives an escape hatch: it tracks nova-api's own 'dev' dist-tag and
  # publishes a matching @wandelbots/nova-js build under the 'dev' npm tag,
  # so bleeding-edge API changes can be tried via `pnpm add @wandelbots/nova-js@dev`
  # ahead of an official nova-api release. It also surfaces type-check/test
  # failures early if nova-api makes a breaking change.
  publish-nova-api-dev:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - name: Determine target nova-api version
        id: nova-api
        run: |
          VERSION="${{ github.event.inputs.nova-api-version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(npm view @wandelbots/nova-api dist-tags.dev)
          fi
          SANITIZED=$(echo "$VERSION" | tr '.' '-')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"
      - name: Skip if this nova-api version was already published
        id: skip-check
        run: |
          CURRENT=$(npm view "@wandelbots/nova-js@dev" version 2>/dev/null || true)
          if [[ "$CURRENT" == *"nova-api-dev.${{ steps.nova-api.outputs.sanitized }}"* ]]; then
            echo "Version for nova-api ${{ steps.nova-api.outputs.version }} already published as $CURRENT, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump @wandelbots/nova-api to target version
        if: steps.skip-check.outputs.skip != 'true'
        run: pnpm add -D "@wandelbots/nova-api@${{ steps.nova-api.outputs.version }}"
      - name: Determine base version
        id: base-version
        if: steps.skip-check.outputs.skip != 'true'
        run: echo "version=$(npm view @wandelbots/nova-js version)" >> "$GITHUB_OUTPUT"
      - name: Set package.json version
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          DEV_VERSION="${{ steps.base-version.outputs.version }}-nova-api-dev.${{ steps.nova-api.outputs.sanitized }}"
          echo "DEV_VERSION=$DEV_VERSION" >> "$GITHUB_ENV"
          jq --arg version "$DEV_VERSION" '.version = $version' package.json > package.tmp.json && mv package.tmp.json package.json
      - name: Build against the target nova-api version
        if: steps.skip-check.outputs.skip != 'true'
        env:
          # tsdown.config.ts only lets tsnapi auto-update (rather than fail
          # the build) the API snapshot when CI is unset; overriding it here
          # is safe since this is a throwaway checkout, not committed back
          CI: ""
        run: pnpm run build
      - name: Type-check & test for compatibility issues
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          pnpm run tsc
          pnpm exec vitest run
      - name: Install Node.js
        if: steps.skip-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24 # Need a recent npm version for npm trusted publishers
      - name: Publish to npm
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            npm publish --tag dev --dry-run
          else
            npm publish --tag dev
          fi
      - name: Write summary
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          {
            echo "### 📦 Published \`@wandelbots/nova-js@$DEV_VERSION\`"
            echo ""
            echo "Built against \`@wandelbots/nova-api@${{ steps.nova-api.outputs.version }}\`"
            echo ""
            echo '```'
            echo "pnpm add @wandelbots/nova-js@dev"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
