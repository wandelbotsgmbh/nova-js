name: ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm run build
      - run: pnpm run tsc
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm run biome
  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - run: pnpm run knip
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm run test
  ci:
    if: ${{ always() }}
    needs: [typecheck, biome, knip, test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          test "${{ needs.typecheck.result }}" = success
          test "${{ needs.biome.result }}" = success
          test "${{ needs.knip.result }}" = success
          test "${{ needs.test.result }}" = success